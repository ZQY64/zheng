<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天气预报应用</title>
  <style>
    :root {
      --bg1: #5b8cff;
      --bg2: #7c5cff;
      --card: rgba(255, 255, 255, 0.18);
      --card-border: rgba(255, 255, 255, 0.22);
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.82);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .search-bar input {
      width: min(360px, 72vw);
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      border-radius: 16px;
      outline: none;
      backdrop-filter: blur(12px);
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.75); }

    .btn {
      border: 0;
      padding: 14px 18px;
      border-radius: 16px;
      cursor: pointer;
      color: #fff;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      transition: transform .2s ease, background .2s ease;
    }
    .btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.28); }
    .btn.primary { background: linear-gradient(135deg, #52d6ff, #4e8cff); }
    .btn.primary:hover { background: linear-gradient(135deg, #62dcff, #6496ff); }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 22px;
    }

    .current {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      min-height: 240px;
    }

    .weather-icon {
      width: 96px;
      height: 96px;
      font-size: 72px;
      display: grid;
      place-items: center;
    }

    .place h2 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
    }
    .place .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .temp {
      text-align: right;
    }
    .temp .value {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
    }
    .temp .desc {
      color: var(--muted);
      margin-top: 6px;
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .stat .label { color: rgba(255,255,255,0.75); font-size: 13px; }
    .stat .value { margin-top: 6px; font-size: 18px; font-weight: 600; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title h3 {
      margin: 0;
      font-size: 18px;
    }
    .section-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .day {
      padding: 16px 12px;
      border-radius: 18px;
      text-align: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .day .name { font-weight: 700; margin-bottom: 8px; }
    .day .icon { font-size: 32px; margin: 6px 0; }
    .day .range { font-size: 14px; color: var(--muted); }

    .loading, .error {
      padding: 14px 16px;
      border-radius: 16px;
      margin-top: 12px;
      display: none;
    }
    .loading { background: rgba(255,255,255,0.15); }
    .error { background: rgba(255, 80, 80, 0.22); }

    .footer-note {
      margin-top: 16px;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .forecast { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .current { grid-template-columns: 1fr; text-align: center; }
      .temp { text-align: center; }
    }

    @media (max-width: 540px) {
      .app { padding: 14px; }
      .brand h1 { font-size: 24px; }
      .search-bar input { width: 100%; }
      .forecast { grid-template-columns: 1fr; }
      .temp .value { font-size: 52px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <h1>天气预报应用</h1>
        <p>支持城市搜索、定位、实时天气、未来 5 天天气预报</p>
      </div>
      <div class="search-bar">
        <input id="cityInput" type="text" placeholder="输入城市名称，例如：北京 / Shanghai / 广州" />
        <button class="btn primary" id="searchBtn">搜索天气</button>
        <button class="btn" id="locationBtn">当前位置</button>
      </div>
    </header>

    <div id="loading" class="loading">正在获取天气数据...</div>
    <div id="error" class="error"></div>

    <main class="grid">
      <section class="card">
        <div class="current">
          <div class="weather-icon" id="weatherIcon">☀️</div>
          <div class="place">
            <h2 id="cityName">--</h2>
            <div class="meta" id="updateTime">更新时间：--</div>
            <div class="meta" id="coords">经纬度：--</div>
          </div>
          <div class="temp">
            <div class="value" id="temperature">--°</div>
            <div class="desc" id="weatherDesc">--</div>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="label">体感温度</div>
            <div class="value" id="apparentTemp">--</div>
          </div>
          <div class="stat">
            <div class="label">风速</div>
            <div class="value" id="windSpeed">--</div>
          </div>
          <div class="stat">
            <div class="label">降水概率</div>
            <div class="value" id="precipProb">--</div>
          </div>
          <div class="stat">
            <div class="label">最高 / 最低</div>
            <div class="value" id="tempRange">--</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-title">
          <h3>未来 5 天天气预报</h3>
          <span>每日最高 / 最低温度与天气状况</span>
        </div>
        <div class="forecast" id="forecast"></div>
        <div class="footer-note">
          技术说明：本示例使用 Open-Meteo 免费接口（无需 API Key），
          结合浏览器 Geolocation API 和 localStorage 实现定位、搜索与最近一次城市缓存。
        </div>
      </section>
    </main>
  </div>

  <script>
    const els = {
      cityInput: document.getElementById('cityInput'),
      searchBtn: document.getElementById('searchBtn'),
      locationBtn: document.getElementById('locationBtn'),
      loading: document.getElementById('loading'),
      error: document.getElementById('error'),
      cityName: document.getElementById('cityName'),
      updateTime: document.getElementById('updateTime'),
      coords: document.getElementById('coords'),
      weatherIcon: document.getElementById('weatherIcon'),
      temperature: document.getElementById('temperature'),
      weatherDesc: document.getElementById('weatherDesc'),
      apparentTemp: document.getElementById('apparentTemp'),
      windSpeed: document.getElementById('windSpeed'),
      precipProb: document.getElementById('precipProb'),
      tempRange: document.getElementById('tempRange'),
      forecast: document.getElementById('forecast')
    };

    const WEATHER_MAP = {
      0:  { text: '晴', icon: '☀️' },
      1:  { text: '大部晴朗', icon: '🌤️' },
      2:  { text: '局部多云', icon: '⛅' },
      3:  { text: '阴', icon: '☁️' },
      45: { text: '雾', icon: '🌫️' },
      48: { text: '雾凇', icon: '🌫️' },
      51: { text: '轻度毛毛雨', icon: '🌦️' },
      53: { text: '毛毛雨', icon: '🌦️' },
      55: { text: '强毛毛雨', icon: '🌧️' },
      56: { text: '冻毛毛雨', icon: '🌧️' },
      57: { text: '强冻毛毛雨', icon: '🌧️' },
      61: { text: '小雨', icon: '🌧️' },
      63: { text: '中雨', icon: '🌧️' },
      65: { text: '大雨', icon: '🌧️' },
      66: { text: '冻雨', icon: '🌧️' },
      67: { text: '强冻雨', icon: '🌧️' },
      71: { text: '小雪', icon: '🌨️' },
      73: { text: '中雪', icon: '🌨️' },
      75: { text: '大雪', icon: '❄️' },
      77: { text: '雪粒', icon: '❄️' },
      80: { text: '阵雨', icon: '🌦️' },
      81: { text: '强阵雨', icon: '🌧️' },
      82: { text: '暴阵雨', icon: '⛈️' },
      85: { text: '阵雪', icon: '🌨️' },
      86: { text: '强阵雪', icon: '❄️' },
      95: { text: '雷暴', icon: '⛈️' },
      96: { text: '雷暴伴小冰雹', icon: '⛈️' },
      99: { text: '雷暴伴大冰雹', icon: '⛈️' }
    };

    const saveLastCity = (city) => localStorage.setItem('lastCity', city);
    const getLastCity = () => localStorage.getItem('lastCity') || '北京';

    function showLoading(show) {
      els.loading.style.display = show ? 'block' : 'none';
    }
    function showError(msg = '') {
      els.error.textContent = msg;
      els.error.style.display = msg ? 'block' : 'none';
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return new Intl.DateTimeFormat('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' }).format(d);
    }

    function weatherInfo(code) {
      return WEATHER_MAP[code] || { text: '未知天气', icon: '🌈' };
    }

    async function geocodeCity(city) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('城市搜索失败');
      const data = await res.json();
      if (!data.results || !data.results.length) throw new Error('未找到该城市，请检查输入');
      return data.results[0];
    }

    async function reverseGeocode(lat, lon) {
      try {
        const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`;
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    async function fetchWeather(lat, lon, cityLabel = '') {
      showLoading(true);
      showError('');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('天气数据获取失败');
        const data = await res.json();

        const current = data.current_weather;
        const todayIndex = 0;
        const codeInfo = weatherInfo(current.weathercode);
        const daily = data.daily;

        els.cityName.textContent = cityLabel || '当前位置';
        els.updateTime.textContent = `更新时间：${new Date(current.time).toLocaleString('zh-CN')}`;
        els.coords.textContent = `经纬度：${Number(lat).toFixed(4)}, ${Number(lon).toFixed(4)}`;
        els.weatherIcon.textContent = codeInfo.icon;
        els.temperature.textContent = `${Math.round(current.temperature)}°`;
        els.weatherDesc.textContent = codeInfo.text;
        els.apparentTemp.textContent = `${Math.round(current.temperature)}°C`;
        els.windSpeed.textContent = `${current.windspeed} km/h`;
        els.precipProb.textContent = `${daily.precipitation_probability_max?.[todayIndex] ?? '--'}%`;
        els.tempRange.textContent = `${Math.round(daily.temperature_2m_max?.[todayIndex])}° / ${Math.round(daily.temperature_2m_min?.[todayIndex])}°`;

        els.forecast.innerHTML = daily.time.slice(0, 5).map((date, i) => {
          const info = weatherInfo(daily.weathercode[i]);
          return `
            <div class="day">
              <div class="name">${i === 0 ? '今天' : formatDate(date)}</div>
              <div class="icon">${info.icon}</div>
              <div>${info.text}</div>
              <div class="range">${Math.round(daily.temperature_2m_max[i])}° / ${Math.round(daily.temperature_2m_min[i])}°</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        showError(err.message || '加载天气失败');
      } finally {
        showLoading(false);
      }
    }

    async function searchByCity(city) {
      if (!city || !city.trim()) {
        showError('请输入城市名称');
        return;
      }
      const place = await geocodeCity(city.trim());
      saveLastCity(city.trim());
      await fetchWeather(place.latitude, place.longitude, `${place.name}${place.admin1 ? '，' + place.admin1 : ''}${place.country ? '，' + place.country : ''}`);
    }

    async function useCurrentLocation() {
      if (!navigator.geolocation) {
        showError('当前浏览器不支持定位');
        return;
      }
      showLoading(true);
      showError('');
      navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
          const { latitude, longitude } = pos.coords;
          const place = await reverseGeocode(latitude, longitude);
          const label = place?.city || place?.locality || place?.principalSubdivision || '当前位置';
          await fetchWeather(latitude, longitude, label);
        } catch (e) {
          showError(e.message || '定位获取失败');
          showLoading(false);
        }
      }, (err) => {
        showError(err.message || '无法获取当前位置，请检查定位权限');
        showLoading(false);
      }, { enableHighAccuracy: true, timeout: 10000 });
    }

    els.searchBtn.addEventListener('click', () => searchByCity(els.cityInput.value));
    els.locationBtn.addEventListener('click', useCurrentLocation);
    els.cityInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchByCity(els.cityInput.value);
    });

    // 初始化：优先显示上次搜索城市
    (async function init() {
      els.cityInput.value = getLastCity();
      try {
        await searchByCity(getLastCity());
      } catch {
        // 如果默认城市失败，尝试当前位置
        await useCurrentLocation();
      }
    })();
  </script>
</body>
</html>
